<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>interactive rating component</title>
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./src/reset.css" />
    <link rel="stylesheet" href="./src/index.css" />
    <script type="module" src="./src/index.ts"></script>
  </head>
  <body>
    <main>
      <section aria-labelledby="rating-heading">
        <picture>
          <img src="./assets/images/icon-star.svg" alt="star" />
        </picture>

        <h1 id="rating-heading">How did we do?</h1>

        <p>
          Please let us know how we did with your support request. All feedback
          is appreciated to help us improve our offering!
        </p>

        <form>
          <label>1<input type="radio" name="rating" value="1" /></label>
          <label>2<input type="radio" name="rating" value="2" /></label>
          <label>3<input type="radio" name="rating" value="3" /></label>
          <label>4<input type="radio" name="rating" value="4" /></label>
          <label>5<input type="radio" name="rating" value="5" /></label>
          <button type="submit">SUBMIT</button>
        </form>
      </section>

      <section aria-labelledby="toast-heading">
        <figure>
          <picture>
            <img
              src="./assets/images/illustration-thank-you.svg"
              alt="rating completed"
            />
          </picture>
          <figcaption>You selected 4 out of 5</figcaption>
        </figure>

        <h1 id="toast-heading">Thank you!</h1>

        <p>
          We appreciate you taking the time to give a rating. If you ever need
          more support, don’t hesitate to get in touch!
        </p>
      </section>
    </main>
  </body>
</html>
